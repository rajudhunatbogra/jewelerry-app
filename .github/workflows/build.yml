name: Flutter Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Find Project and Install Dependencies
      run: |
        if [ -f pubspec.yaml ]; then
          flutter pub get
        else
          # যদি কোনো সাব-ফোল্ডারে থাকে তবে সেটি খুঁজে বের করে কাজ করবে
          PROJECT_DIR=$(find . -maxdepth 2 -name "pubspec.yaml" -exec dirname {} \;)
          echo "Project found in: $PROJECT_DIR"
          cd $PROJECT_DIR
          flutter pub get
        fi

    - name: Build APK
      run: |
        if [ -f pubspec.yaml ]; then
          flutter build apk --release
        else
          PROJECT_DIR=$(find . -maxdepth 2 -name "pubspec.yaml" -exec dirname {} \;)
          cd $PROJECT_DIR
          flutter build apk --release
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jewelry-shop-app
        path: |
          build/app/outputs/flutter-apk/app-release.apk
          **/build/app/outputs/flutter-apk/app-release.apk
