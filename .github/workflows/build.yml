name: Build Flutter APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create Fresh Flutter Project
        run: |
          cd ..
          flutter create fresh_app --org com.jewelry.shop
          cp $GITHUB_WORKSPACE/main.dart fresh_app/lib/main.dart
          cd fresh_app
          flutter build apk --split-per-abi
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk $GITHUB_WORKSPACE/app-release.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jewelry-shop-app
          path: app-release.apk
